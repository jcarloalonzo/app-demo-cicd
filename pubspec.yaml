name: app_test_cicd
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  dev: ^1.0.0
  flutter_bloc: ^8.1.5
  flutter_dotenv: ^5.1.0
  flutter_launcher_icons: ^0.14.2
  flutter_svg: ^2.0.5
  get_it: ^8.0.3
  go_router: ^14.1.4
  http: ^1.2.0
  intl: ^0.20.1
  jiffy: ^6.2.1
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.5.4
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  mockito: ^5.4.6

flutter:
  uses-material-design: true


scripts:
  generate_freezed: flutter pub run build_runner build --delete-conflicting-outputs
  generate_apk_production: flutter build apk --flavor production -t lib/main_production.dart --release
  generate_apk_test: flutter build apk --flavor staging -t lib/main_staging.dart --release
  generate_ios_production: flutter build ios --flavor production -t lib/main_production.dart --release
  generate_ios_test: flutter build ios --flavor staging -t lib/main_staging.dart --release 
  generate_ipa_ios_production: flutter build ipa --flavor production -t lib/main_production.dart --release
  # 
  # 
  generate_ipa_ios_production_cicd: flutter build ipa   --flavor production -t lib/main_production.dart --release  --export-options-plist=ios/ExportOptionsProduction.plist
