# https://github.com/marketplace/actions/checkout
# https://github.com/marketplace/actions/setup-java-jdk
# https://github.com/marketplace/actions/flutter-action
# https://github.com/marketplace/actions/upload-a-build-artifact
# https://github.com/marketplace/actions/import-code-signing-certificates
# https://github.com/marketplace/actions/apple-provisioning-profile-action
# https://github.com/marketplace/actions/upload-app-to-testflight
name: Flutter CI
on:
  push:
    branches:
      - dev

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: "3.29.3"
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin" # Dist. oficial de Eclipse. La más estable y recomendada para Android/Flutter build.

jobs:
  prepare:
    name: Prepare configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        #

      # Generar cache keys únicas
      # 
      # 

      - name: Generate cache keys
        id: cache-keys
        run: |
          echo "flutter=${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}" >> $GITHUB_OUTPUT
          echo "pub=${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}" >> $GITHUB_OUTPUT
          echo "build=${{ runner.os }}-build-${{ hashFiles('**/*.dart', '**/pubspec.yaml') }}" >> $GITHUB_OUTPUT

      # Cache de Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: |
            /opt/hostedtoolcache/flutter
            ~/.flutter-sdk
          key: ${{ steps.cache-keys.outputs.flutter }}
# 
# 
# 
# 

      - name: Setup Java ( Android build )
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          #
      - name: Mostrar Java dis
        run: echo "${{ env.JAVA_VERSION }}"
        # Instalar flutter sdk
        #
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          #
          #
      - name: Verificar versión de Flutter
        run: flutter --version
        #
      - name: Install dependencies
        run: |
          flutter pub get

      - name: Run code generation
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-dependencies
          path: |

            .dart_tool/
            .packages
            pubspec.lock
            lib/**/*.g.dart
            lib/**/*.freezed.dart
          retention-days: 1

  analyze:
    name: Analyze
    needs: prepare
    runs-on: ubuntu-latest
    if: false
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: flutter-dependencies

      - name: Analyze code
        run: flutter analyze

  test:
    name: Run tests
    needs: prepare
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: flutter-dependencies

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 2
      # Opcional...
      # - name: Coverage Report
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./coverage/lcov.info
      #     flags: unittests
      #     name: codecov-umbrella
      #   if: always()

  # Build Staging
  build_staging:
    name: Build Staging apk
    needs: [prepare, test]
    runs-on: ubuntu-latest
    if: false # Temporarily disabled
    environment: staging

    # if: github.ref == 'refs/heads/test' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

        # # Setup Java
      - name: Setup Java ( Android build )
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          #
          #
      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: flutter-dependencies
          #
      - name: Setup staging keystore..
        run: |
          echo "Setting up staging keystore..."
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/staging-keystore.jks

          #verify keystore..
          ls -la android/app/staging-keystore.jks

          keytool -list -v -keystore android/app/staging-keystore.jks -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEYSTORE_PASSWORD }} || true

          # Create key.staging.properties
          cat > android/key.staging.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=staging-keystore.jks
          EOF

          # Verify file structure
          echo "=== Final file structure ==="
          echo "Directory android/:"
          ls -la android/
          echo "Directory android/app/:"
          ls -la android/app/
          echo ".properties files found:"
          find android -name "*.properties" -type f
          echo ".jks files found:"
          find android -name "*.jks" -type f

      - name: Build Staging apk
        run: |
          echo "Building Staging apk..."
          flutter build apk --flavor staging -t lib/main_staging.dart --release
          echo "Staging apk build completed."

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-staging-release.apk \
             build/app/outputs/flutter-apk/appdemo-staging-v${{ github.run_number }}-${{ github.sha }}.apk
          ls -la build/app/outputs/flutter-apk/

      - name: Upload Staging APK
        uses: actions/upload-artifact@v4
        with:
          name: appdemo-staging-${{ github.sha }}
          path: build/app/outputs/flutter-apk/appdemo-staging-v${{ github.run_number }}-${{ github.sha }}.apk
          retention-days: 2

  build-production:
    name: Build Production APK
    needs: [prepare, test]
    runs-on: ubuntu-latest
    environment: production
    if: false

    # if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repos
        uses: actions/checkout@v4

      # - name: Configure Git for private repos
      #   run: |
      #     git config --global url."https://${{ secrets.PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
      #   if: ${{ secrets.PAT_TOKEN != '' }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: flutter-dependencies

      - name: Setup Production Keystore
        run: |
          echo "Setting up production keystore..."
          mkdir -p android/app/
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/production-keystore.jks

          # Verify keystore
          echo "Verifying keystore created:"
          ls -la android/app/production-keystore.jks

          # Create key.production.properties
          cat > android/key.production.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=production-keystore.jks
          EOF

          # Verify file structure
          echo "=== Final file structure ==="
          echo "Directory android/:"
          ls -la android/
          echo "Directory android/app/:"
          ls -la android/app/
          echo ".properties files found:"
          find android -name "*.properties" -type f
          echo ".jks files found:"
          find android -name "*.jks" -type f

      - name: Build Production APK
        run: |
          flutter build apk --flavor production -t lib/main_production.dart --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-production-release.apk \
             build/app/outputs/flutter-apk/appdemo-production-v${{ github.run_number }}-${{ github.sha }}.apk
          ls -la build/app/outputs/flutter-apk/

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: appdemo-production-${{ github.sha }}
          path: build/app/outputs/flutter-apk/appdemo-production-v${{ github.run_number }}-${{ github.sha }}.apk
          retention-days: 14

  build-ios-prod:
    name: Build iOS Production
    # needs: [prepare, test]
    needs: prepare
    runs-on: macos-latest
    environment:
      name: production
      url: https://appstoreconnect.apple.com

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: flutter-dependencies


      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.IOS_P12_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_CERT_PASSWORD }}

      - name: Verify code‑sign identities
        run: |
          echo "🔍 Identidades instaladas:"
          security find-identity -p codesigning -v
      #
      # --- PASO AÑADIDO / DESCOMENTADO ---

      - name: Download & install Development Provisioning Profile
        uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: "com.jelafintegradores.democicd" # Asegúrate que este sea tu Bundle ID correcto
          profile-type: "IOS_APP_DEVELOPMENT" # Perfil para subir a la App Store
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}




      # Instala el perfil de aprovisionamiento para la App Store
      - name: Download & install App Store Provisioning Profile
        uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: "com.jelafintegradores.democicd" # Asegúrate que este sea tu Bundle ID correcto
          profile-type: "IOS_APP_STORE" # Perfil para subir a la App Store
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
      # ------------------------------------
    # — NUEVO PASO: listar los perfiles instalados —
    # — NUEVO PASO: listar los perfiles instalados —
      - name: List provisioning profiles
        run: |
          echo "📱 Perfiles instalados:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          

      - name: Build IPA (Production)
        run: |
          flutter build ipa \
            --flavor production \
            -t lib/main_production.dart \
            --release \
            --export-method app-store \
            -- -allowProvisioningUpdates


      - name: Verify IPA exists
        run: |
          IPA_DIR="build/ios/ipa"
          echo "🔍 Contenido de $IPA_DIR:"
          ls -lh "$IPA_DIR"/*.ipa || (echo "❌ No se encontró ningún .ipa" && exit 1)

      #
      - name: Verify IPA exists
        run: |
          echo "🔍 IPA files:"
          ls -lh build/ios/ipa/*.ipa
      # Sube el IPA a TestFlight
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # Guarda el IPA como artifact
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-ipa-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          retention-days: 30
