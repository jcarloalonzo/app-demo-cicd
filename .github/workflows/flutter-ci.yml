# https://github.com/marketplace/actions/checkout
# https://github.com/marketplace/actions/setup-java-jdk
# https://github.com/marketplace/actions/flutter-action
# https://github.com/marketplace/actions/upload-a-build-artifact
# https://github.com/marketplace/actions/import-code-signing-certificates
# https://github.com/marketplace/actions/apple-provisioning-profile-action
# https://github.com/marketplace/actions/upload-app-to-testflight
# https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby
name: Flutter CI
on:
  push:
    branches:
      - dev

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: "3.29.3"
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin" # Dist. oficial de Eclipse. La más estable y recomendada para Android/Flutter build.

jobs:
  prepare:
    name: Prepare configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        #

      # Generar cache keys únicas
      #
      #

      - name: Generate cache keys
        id: cache-keys
        run: |
          echo "flutter=${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}" >> $GITHUB_OUTPUT
          echo "pub=${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}" >> $GITHUB_OUTPUT
          echo "build=${{ runner.os }}-build-${{ hashFiles('**/*.dart', '**/pubspec.yaml') }}" >> $GITHUB_OUTPUT

      # Cache de Flutter SDK
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: |
            /opt/hostedtoolcache/flutter
            ~/.flutter-sdk
          key: ${{ steps.cache-keys.outputs.flutter }}
      #
      #
      #
      #

      - name: Setup Java ( Android build )
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          #
      - name: Mostrar Java dis
        run: echo "${{ env.JAVA_VERSION }}"
        # Instalar flutter sdk
        #
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          #
          #
      - name: Verificar versión de Flutter
        run: flutter --version
        #
      - name: Install dependencies
        run: |
          flutter pub get

      - name: Run code generation
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-dependencies
          path: |

            .dart_tool/
            .packages
            pubspec.lock
            lib/**/*.g.dart
            lib/**/*.freezed.dart
          retention-days: 1

  analyze:
    name: Analyze
    needs: prepare
    runs-on: ubuntu-latest
    if: false
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: flutter-dependencies

      - name: Analyze code
        run: flutter analyze

  test:
    name: Run tests
    needs: prepare
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: flutter-dependencies

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 2
      # Opcional...
      # - name: Coverage Report
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./coverage/lcov.info
      #     flags: unittests
      #     name: codecov-umbrella
      #   if: always()

  build-production:
    name: Build Production APK
    # needs: [prepare, test]
    needs: prepare

    runs-on: ubuntu-latest
    environment: production
    # if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repos
        uses: actions/checkout@v4

      # - name: Configure Git for private repos
      #   run: |
      #     git config --global url."https://${{ secrets.PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
      #   if: ${{ secrets.PAT_TOKEN != '' }}

      #Instala Ruby y configura el entorno para Fastlane
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      # 3. Instala la gema Fastlane para poder ejecutar las lanes definidas en Fastfile
      - name: Install Fastlane
        run: gem install fastlane

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Get Flutter packages
        run: flutter pub get

      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: flutter-dependencies

      - name: Write Play store credential
        working-directory: android
        run: |
          echo "${{ secrets.PLAY_STORE_CONFIG_JSON }}" | base64 -d > playstore-credential.json
          echo "PLAY_STORE_CONFIG_JSON file created successfully."
          ls
          ls -la
          pwd

      - name: Run Fastlane lane
        working-directory: android
        env:
          # Keystore (base64), contraseñas y alias desde GitHub Secrets
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          # Ruta al JSON de credenciales de Google Play
          PLAY_STORE_CONFIG_JSON: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
        run: fastlane android deploy_production
